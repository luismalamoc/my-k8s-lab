apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "hello-api.fullname" . }}-test"
  labels: {{- include "hello-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: ['curl']
      args:
        - '-fsS'
        - 'http://{{ include "hello-api.fullname" . }}/healthz'